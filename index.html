<!DOCTYPE html>
<html>
<head>
<title>Web Harmonium</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.header{
background:#0b8a80;
color:white;
padding:18px;
font-size:26px;
}

/* Keyboard */

.keyboard{
position:relative;
width:560px;
margin:20px auto;
}

.white{
width:80px;
height:220px;
background:white;
border:1px solid black;
display:inline-block;
line-height:200px;
font-weight:bold;
}

.black{
width:50px;
height:130px;
background:black;
position:absolute;
top:0;
}

/* Black key positions */

#k1{left:60px;}
#k2{left:140px;}
#k3{left:300px;}
#k4{left:380px;}
#k5{left:460px;}

/* Control Boxes */

.box{
background:#6f8f9c;
color:white;
padding:15px;
margin:20px;
border-radius:5px;
}

.slider{
width:80%;
}

.button{
padding:10px 20px;
font-size:20px;
margin:10px;
}

</style>

</head>

<body>

<div class="header">
Web Harmonium
</div>

<!-- Keyboard -->

<div class="keyboard">

<div class="white"
onclick="play('C')">C</div>

<div class="white"
onclick="play('D')">D</div>

<div class="white"
onclick="play('E')">E</div>

<div class="white"
onclick="play('F')">F</div>

<div class="white"
onclick="play('G')">G</div>

<div class="white"
onclick="play('A')">A</div>

<div class="white"
onclick="play('B')">B</div>

<div class="black"
id="k1"
onclick="play('Cs')"></div>

<div class="black"
id="k2"
onclick="play('Ds')"></div>

<div class="black"
id="k3"
onclick="play('Fs')"></div>

<div class="black"
id="k4"
onclick="play('Gs')"></div>

<div class="black"
id="k5"
onclick="play('As')"></div>

</div>

<!-- Volume -->

<div class="box">

Volume:
<br><br>

<input type="range"
min="0"
max="1"
step="0.1"
value="1"
class="slider"
oninput="setVolume(this.value)">

</div>

<!-- Reverb -->

<div class="box">

Reverb

<br><br>

<input type="checkbox"
onclick="toggleReverb()">

</div>

<!-- Transpose -->

<div class="box">

Transpose

<br><br>

<button class="button"
onclick="transpose(-1)">
-
</button>

<span id="transposeValue">
0
</span>

<button class="button"
onclick="transpose(1)">
+
</button>

</div>

<!-- Audio -->

<audio id="C" src="C.mp3"></audio>
<audio id="D" src="D.mp3"></audio>
<audio id="E" src="E.mp3"></audio>
<audio id="F" src="F.mp3"></audio>
<audio id="G" src="G.mp3"></audio>
<audio id="A" src="A.mp3"></audio>
<audio id="B" src="B.mp3"></audio>

<audio id="Cs" src="Cs.mp3"></audio>
<audio id="Ds" src="Ds.mp3"></audio>
<audio id="Fs" src="Fs.mp3"></audio>
<audio id="Gs" src="Gs.mp3"></audio>
<audio id="As" src="As.mp3"></audio>

<script>

let volume=1;
let transposeValue=0;

function setVolume(v){
volume=v;
}

function play(note){

let sound=
document.getElementById(note);

sound.volume=volume;
sound.currentTime=0;
sound.play();

}

function toggleReverb(){

alert("Reverb ON/OFF");

}

function transpose(n){

transposeValue+=n;

document.getElementById(
"transposeValue"
).innerText
