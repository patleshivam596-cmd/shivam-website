<!DOCTYPE html>
<html>
<head>
<title>Advanced Web Harmonium</title>

<style>

body {
  background: #111;
  color: white;
  text-align: center;
  font-family: Arial;
}

h1 {
  margin-top: 20px;
}

.keyboard {
  display: flex;
  justify-content: center;
  margin-top: 40px;
  position: relative;
}

.white {
  width: 60px;
  height: 220px;
  background: white;
  border: 1px solid black;
  margin: 2px;
  cursor: pointer;
}

.white:active {
  background: yellow;
}

.black {
  width: 40px;
  height: 130px;
  background: black;
  position: relative;
  margin-left: -20px;
  margin-right: -20px;
  z-index: 2;
  cursor: pointer;
}

.black:active {
  background: red;
}

.controls {
  margin-top: 20px;
}

</style>

</head>

<body>

<h1>My Web Harmonium 🎹</h1>

<div class="controls">

<label>Volume 🔊</label>

<input 
type="range" 
min="0" 
max="1" 
step="0.1" 
value="0.5" 
id="volume">

</div>

<div class="keyboard">

<!-- OCTAVE 1 -->

<div class="white" onclick="play('C4')"></div>
<div class="black" onclick="play('C#4')"></div>

<div class="white" onclick="play('D4')"></div>
<div class="black" onclick="play('D#4')"></div>

<div class="white" onclick="play('E4')"></div>

<div class="white" onclick="play('F4')"></div>
<div class="black" onclick="play('F#4')"></div>

<div class="white" onclick="play('G4')"></div>
<div class="black" onclick="play('G#4')"></div>

<div class="white" onclick="play('A4')"></div>
<div class="black" onclick="play('A#4')"></div>

<div class="white" onclick="play('B4')"></div>

<!-- OCTAVE 2 -->

<div class="white" onclick="play('C5')"></div>
<div class="black" onclick="play('C#5')"></div>

<div class="white" onclick="play('D5')"></div>
<div class="black" onclick="play('D#5')"></div>

<div class="white" onclick="play('E5')"></div>

<div class="white" onclick="play('F5')"></div>
<div class="black" onclick="play('F#5')"></div>

<div class="white" onclick="play('G5')"></div>
<div class="black" onclick="play('G#5')"></div>

<div class="white" onclick="play('A5')"></div>
<div class="black" onclick="play('A#5')"></div>

<div class="white" onclick="play('B5')"></div>

</div>

<script>

function play(note) {

let volume =
document.getElementById("volume").value;

let audio = new Audio(
"https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@master/FluidR3_GM/acoustic_grand_piano-mp3/"
+ note + ".mp3"
);

audio.volume = volume;

audio.play();

}

</script>

</body>
</html>
