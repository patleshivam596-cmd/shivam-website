<!DOCTYPE html>
<html>
<head>
<title>Web Harmonium</title>

<style>

body {
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

h1 {
  margin-top:20px;
}

.keyboard {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:30px;
}

.key {
  width:60px;
  height:200px;
  background:white;
  border:1px solid black;
  margin:2px;
  cursor:pointer;
}

.key.black {
  background:black;
  width:40px;
  height:120px;
}

.key:active {
  background:yellow;
}

.controls {
  margin-top:20px;
}

</style>

</head>

<body>

<h1>My Web Harmonium 🎹</h1>

<div class="controls">

<label>Volume 🔊</label>

<input
type="range"
min="0"
max="1"
step="0.1"
value="0.5"
id="volume">

</div>

<div class="keyboard" id="keyboard"></div>

<script>

// NOTES LIST (3 OCTAVE)

let notes = [

"C3","D3","E3","F3","G3","A3","B3",

"C4","D4","E4","F4","G4","A4","B4",

"C5","D5","E5","F5","G5","A5","B5"

];

let keyboard =
document.getElementById("keyboard");

// CREATE KEYS

notes.forEach(note => {

let key =
document.createElement("div");

key.className = "key";

key.innerText = note;

key.onclick = () => play(note);

keyboard.appendChild(key);

});

// PLAY SOUND FUNCTION

function play(note) {

let volume =
document.getElementById("volume").value;

let audio = new Audio(
"https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@master/FluidR3_GM/acoustic_grand_piano-mp3/"
+ note + ".mp3"
);

audio.volume = volume;

audio.play();

}

// KEYBOARD SUPPORT

document.addEventListener("keydown",
function(e){

let map = {

"a":"C4",
"s":"D4",
"d":"E4",
"f":"F4",
"g":"G4",
"h":"A4",
"j":"B4"

};

if(map[e.key]) {

play(map[e.key]);

}

});

</script>

</body>
</html>
