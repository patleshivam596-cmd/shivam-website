<!DOCTYPE html>
<html>
<head>
<title>My Harmonium</title>

<style>

body {
    margin:0;
    background:#111;
    text-align:center;
    font-family:Arial;
    color:white;
}

h1 {
    padding:10px;
}

/* Volume Slider */

.controls {
    margin:10px;
}

/* Keyboard */

.keyboard {
    position:relative;
    width:560px;
    margin:auto;
}

/* White Keys */

.white {
    width:80px;
    height:260px;
    background:white;
    border:1px solid black;
    display:inline-block;
    color:black;
    line-height:240px;
    font-weight:bold;
}

/* Black Keys */

.black {
    width:50px;
    height:150px;
    background:black;
    position:absolute;
    top:0;
    color:white;
    line-height:130px;
}

/* Black Key Positions */

#k1 { left:60px; }
#k2 { left:140px; }
#k3 { left:300px; }
#k4 { left:380px; }
#k5 { left:460px; }

.white:active {
    background:yellow;
}

.black:active {
    background:red;
}

</style>

</head>

<body>

<h1>🎹 My 1-Octave Harmonium</h1>

<div class="controls">

Volume:
<input type="range" min="0" max="1"
step="0.1" value="1"
oninput="setVolume(this.value)">

</div>

<div class="keyboard">

<div class="white" onclick="play('C')">Sa</div>
<div class="white" onclick="play('D')">Re</div>
<div class="white" onclick="play('E')">Ga</div>
<div class="white" onclick="play('F')">Ma</div>
<div class="white" onclick="play('G')">Pa</div>
<div class="white" onclick="play('A')">Dha</div>
<div class="white" onclick="play('B')">Ni</div>

<div class="black" id="k1" onclick="play('Cs')"></div>
<div class="black" id="k2" onclick="play('Ds')"></div>
<div class="black" id="k3" onclick="play('Fs')"></div>
<div class="black" id="k4" onclick="play('Gs')"></div>
<div class="black" id="k5" onclick="play('As')"></div>

</div>

<!-- Audio Files -->

<audio id="C" src="C.mp3"></audio>
<audio id="D" src="D.mp3"></audio>
<audio id="E" src="E.mp3"></audio>
<audio id="F" src="F.mp3"></audio>
<audio id="G" src="G.mp3"></audio>
<audio id="A" src="A.mp3"></audio>
<audio id="B" src="B.mp3"></audio>

<audio id="Cs" src="Cs.mp3"></audio>
<audio id="Ds" src="Ds.mp3"></audio>
<audio id="Fs" src="Fs.mp3"></audio>
<audio id="Gs" src="Gs.mp3"></audio>
<audio id="As" src="As.mp3"></audio>

<script>

let volume = 1;

function setVolume(v){
volume = v;
}

function play(note){

let sound =
document.getElementById(note);

sound.volume = volume;
sound.currentTime = 0;

sound.play();

}

/* Keyboard Controls */

document.addEventListener("keydown",
function(e){

if(e.key=="a") play("C");
if(e.key=="s") play("D");
if(e.key=="d") play("E");
if(e.key=="f") play("F");
if(e.key=="g") play("G");
if(e.key=="h") play("A");
if(e.key=="j") play("B");

});

</script>

</body>
</html>
