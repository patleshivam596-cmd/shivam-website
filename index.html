<!DOCTYPE html>
<html>
<head>
<title>3 Octave Web Harmonium</title>

<style>

body {
  background: #111;
  color: white;
  text-align: center;
  font-family: Arial;
}

h1 {
  margin-top: 20px;
}

.keyboard {
  display: flex;
  justify-content: center;
  margin-top: 40px;
  flex-wrap: wrap;
}

.white {
  width: 50px;
  height: 200px;
  background: white;
  border: 1px solid black;
  margin: 1px;
  cursor: pointer;
}

.white:active {
  background: yellow;
}

.black {
  width: 30px;
  height: 120px;
  background: black;
  position: relative;
  margin-left: -15px;
  margin-right: -15px;
  z-index: 2;
  cursor: pointer;
}

.black:active {
  background: red;
}

.controls {
  margin-top: 20px;
}

</style>

</head>

<body>

<h1>Web Harmonium 🎹</h1>

<div class="controls">

<label>Volume 🔊</label>

<input 
type="range" 
min="0" 
max="1" 
step="0.1" 
value="0.5" 
id="volume">

</div>

<div class="keyboard" id="keyboard"></div>

<script>

let notes = [

"C3","C#3","D3","D#3","E3",
"F3","F#3","G3","G#3","A3","A#3","B3",

"C4","C#4","D4","D#4","E4",
"F4","F#4","G4","G#4","A4","A#4","B4",

"C5","C#5","D5","D#5","E5",
"F5","F#5","G5","G#5","A5","A#5","B5"

];

let keyboard =
document.getElementById("keyboard");

notes.forEach(note => {

let key =
document.createElement("div");

if(note.includes("#")) {
key.className = "black";
}
else {
key.className = "white";
}

key.onclick = () => play(note);

keyboard.appendChild(key);

});

function play(note) {

let volume =
document.getElementById("volume").value;

let audio = new Audio(
"https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@master/FluidR3_GM/acoustic_grand_piano-mp3/"
+ note + ".mp3"
);

audio.volume = volume;

audio.play();

}

document.addEventListener("keydown",
function(e){

let map = {

"a":"C4",
"s":"D4",
"d":"E4",
"f":"F4",
"g":"G4",
"h":"A4",
"j":"B4"

};

if(map[e.key]) {
play(map[e.key]);
}

});

</script>

</body>
</html>
