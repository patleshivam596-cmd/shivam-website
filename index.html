<!DOCTYPE html>
<html>
<head>
<title>Free Fire IGL Pro Guide</title>

<style>
body{
font-family:Arial;
background:#000;
color:#00ffcc;
text-align:center;
}

h1{
margin-top:20px;
}

.section{
background:#111;
margin:20px;
padding:15px;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
cursor:pointer;
background:#00ffcc;
border:none;
}

img{
width:90%;
max-width:350px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<h1>🔥 IGL PRO GUIDE 🔥</h1>

<!-- ROLE SELECT -->
<div class="section">
<h2>Select Your Role</h2>

<button onclick="showRole('assaulter')">Assaulter</button>
<button onclick="showRole('rusher')">Rusher</button>
<button onclick="showRole('sniper')">Sniper</button>

<p id="roleInfo">Click role to see details</p>
</div>

<!-- MAP SELECT -->
<div class="section">
<h2>Select Map</h2>

<button onclick="showMap('bermuda')">Bermuda</button>
<button onclick="showMap('purgatory')">Purgatory</button>
<button onclick="showMap('kalahari')">Kalahari</button>

<p id="mapInfo"></p>
<img id="mapImg" src="">
</div>

<script>

// ROLE INFO
function showRole(role){

let text="";

if(role==="assaulter"){
text="🔫 Assaulter: Front line player. Skills: Alok, Chrono. Position: Push first.";
}

else if(role==="rusher"){
text="⚡ Rusher: Fast attack. Skills: Jota, Kelly. Position: Entry + backup.";
}

else if(role==="sniper"){
text="🎯 Sniper: Long range. Skills: Laura, Rafael. Position: High ground.";
}

document.getElementById("roleInfo").innerText=text;
}

// MAP INFO
function showMap(map){

let text="";
let img="";

if(map==="bermuda"){
text="Bermuda: Clock Tower, Peak, Factory best drop.";
img="https://i.imgur.com/8Qf6R9p.jpg";
}

else if(map==="purgatory"){
text="Purgatory: Brasilia, Ski Lodge best drop.";
img="https://i.imgur.com/3KXnQyL.jpg";
}

else if(map==="kalahari"){
text="Kalahari: Refinery, Command Post best drop.";
img="https://i.imgur.com/eJrX2rC.jpg";
}

document.getElementById("mapInfo").innerText=text;
document.getElementById("mapImg").src=img;

}

</script>

</body>
</html>
