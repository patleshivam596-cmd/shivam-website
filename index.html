<!DOCTYPE html>
<html>
<head>
<title>IGL eSports Pro Guide</title>

<style>
body{
font-family:Arial;
background:#000;
color:#00ffcc;
text-align:center;
}

h1{
margin-top:20px;
}

.section{
background:#111;
margin:15px;
padding:15px;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
cursor:pointer;
background:#00ffcc;
border:none;
border-radius:5px;
}

img{
width:90%;
max-width:350px;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>🔥 IGL PRO eSports Guide 🔥</h1>

<!-- ROLE -->
<div class="section">
<h2>🎯 Select Role</h2>

<button onclick="role('assault')">Assaulter</button>
<button onclick="role('rusher')">Rusher</button>
<button onclick="role('sniper')">Sniper</button>

<p id="roleText">Click role to see strategy</p>
</div>

<!-- MAP -->
<div class="section">
<h2>🗺️ Select Map</h2>

<button onclick="map('bermuda')">Bermuda</button>
<button onclick="map('purgatory')">Purgatory</button>
<button onclick="map('kalahari')">Kalahari</button>

<p id="mapText"></p>
<img id="mapImg">
</div>

<!-- WEAPON -->
<div class="section">
<h2>🔫 Weapon Guide</h2>

<button onclick="weapon('close')">Close Range</button>
<button onclick="weapon('mid')">Mid Range</button>
<button onclick="weapon('long')">Long Range</button>

<p id="weaponText"></p>
</div>

<!-- IGL COMMAND -->
<div class="section">
<h2>🎙️ IGL Commands</h2>

<button onclick="command()">Give Command</button>

<p id="commandText"></p>
</div>

<script>

// ROLE
function role(r){
let t="";
if(r=="assault"){
t="Assaulter: Front push. Skills: Alok, Chrono. Position: First fight.";
}
else if(r=="rusher"){
t="Rusher: Fast entry. Skills: Jota, Kelly. Position: Rush + support.";
}
else{
t="Sniper: Long range. Skills: Laura, Rafael. Position: High ground.";
}
document.getElementById("roleText").innerText=t;
}

// MAP
function map(m){
let t="",img="";
if(m=="bermuda"){
t="Clock Tower, Peak best drop.";
img="https://i.imgur.com/8Qf6R9p.jpg";
}
else if(m=="purgatory"){
t="Brasilia, Ski Lodge best drop.";
img="https://i.imgur.com/3KXnQyL.jpg";
}
else{
t="Refinery best drop.";
img="https://i.imgur.com/eJrX2rC.jpg";
}
document.getElementById("mapText").innerText=t;
document.getElementById("mapImg").src=img;
}

// WEAPON
function weapon(w){
let t="";
if(w=="close"){
t="MP40, M1014 best for rush.";
}
else if(w=="mid"){
t="AK, Scar best balanced.";
}
else{
t="AWM, Kar98 best sniper.";
}
document.getElementById("weaponText").innerText=t;
}

// COMMAND
function command(){
let cmds=[
"Rush left side!",
"Take high ground!",
"Cover me!",
"Fall back!",
"Push now!"
];
let random=cmds[Math.floor(Math.random()*cmds.length)];
document.getElementById("commandText").innerText=random;
}

</script>

</body>
</html>
