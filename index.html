<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Web Harmonium</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: #222;
    color: white;
}

h1 {
    margin-top: 20px;
}

.keyboard {
    margin-top: 40px;
}

.key {
    display: inline-block;
    width: 70px;
    height: 200px;
    margin: 2px;
    background: white;
    border: 1px solid black;
    color: black;
    font-weight: bold;
    line-height: 180px;
    cursor: pointer;
}

.key:active {
    background: yellow;
}
</style>
</head>

<body>

<h1>🎹 My Web Harmonium</h1>

<div class="keyboard">

<div class="key" onclick="playSound('sa')">Sa</div>
<div class="key" onclick="playSound('re')">Re</div>
<div class="key" onclick="playSound('ga')">Ga</div>
<div class="key" onclick="playSound('ma')">Ma</div>
<div class="key" onclick="playSound('pa')">Pa</div>
<div class="key" onclick="playSound('dha')">Dha</div>
<div class="key" onclick="playSound('ni')">Ni</div>

</div>

<script>

function playSound(note) {

    let audio = new Audio(note + ".mp3");
    audio.play();

}

</script>

</body>
</html>
